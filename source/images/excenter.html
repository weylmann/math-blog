<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>旁心向量问题图示</title>
</head>
<body>
    <svg width="400" height="350" viewBox="-0.5 -2.8 4 3.5" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景 -->
        <polygon points="0,0 3,0 1.5,2.598" fill="#fff9c4" stroke="black" stroke-width="2"/>
        
        <!-- 旁切圆 -->
        <circle cx="1.5" cy="-1.732" r="1.732" fill="none" stroke="gray" stroke-dasharray="4"/>
        
        <!-- 投影线 -->
        <line x1="1.5" y1="-1.732" x2="1.3" y2="2.2" stroke="gray" stroke-dasharray="4"/>
        <line x1="1.5" y1="-1.732" x2="1.5" y2="0" stroke="gray" stroke-dasharray="4"/>
        <line x1="1.5" y1="-1.732" x2="1.5" y2="-1.732" stroke="gray" stroke-dasharray="4"/>
        
        <!-- 垂线 -->
        <line x1="1.5" y1="-1.732" x2="1.5" y2="0" stroke="red" stroke-width="2"/>
        <line x1="1.5" y1="-1.732" x2="1.5" y2="-1.732" stroke="blue" stroke-width="2"/>
        
        <!-- 点 -->
        <circle cx="0" cy="0" r="3" fill="white" stroke="black"/>
        <text x="0" y="0.2" font-size="12">A</text>
        
        <circle cx="3" cy="0" r="3" fill="white" stroke="black"/>
        <text x="3" y="0.2" font-size="12">B</text>
        
        <circle cx="1.5" cy="2.598" r="3" fill="white" stroke="black"/>
        <text x="1.5" y="2.8" font-size="12">C</text>
        
        <circle cx="1.5" cy="-1.732" r="3" fill="white" stroke="black"/>
        <text x="1.5" y="-1.9" font-size="12">I_A</text>
        
        <circle cx="1.3" cy="2.2" r="3" fill="white" stroke="black"/>
        <text x="1.3" y="2.4" font-size="12">M</text>
        
        <circle cx="1.5" cy="0" r="3" fill="white" stroke="black"/>
        <text x="1.5" y="0.2" font-size="12">N</text>
        
        <circle cx="1.5" cy="-1.732" r="3" fill="white" stroke="black"/>
        <text x="1.6" y="-1.5" font-size="12">P</text>
        
        <!-- 边标签 -->
        <text x="1.5" y="-0.2" font-size="10">a</text>
        <text x="2.3" y="1.5" font-size="10">a</text>
        <text x="0.7" y="1.5" font-size="10">a</text>
        
        <!-- 向量箭头 -->
        <defs>
            <marker id="arrowred" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                <path d="M0,0 L6,3 L0,6" fill="red"/>
            </marker>
            <marker id="arrowblue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                <path d="M0,0 L6,3 L0,6" fill="blue"/>
            </marker>
        </defs>
        
        <line x1="1.3" y1="2.2" x2="1.5" y2="-1.732" stroke="red" stroke-width="2" marker-end="url(#arrowred)"/>
        
        <!-- 标题 -->
        <text x="1.5" y="-2.5" font-size="10" text-anchor="middle">I_AM + I_AP = I_AN</text>
    </svg>
</body>
</html>
